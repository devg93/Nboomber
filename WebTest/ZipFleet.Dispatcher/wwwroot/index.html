<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZipFleet Dispatcher</title>
    <base href="/" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="css/app.css" />
    <link href="ZipFleet.Dispatcher.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#00d4aa;font-family:monospace;font-size:14px;">
            Loading ZipFleet Dispatcher...
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;background:#1a0a0f;color:#ff4466;padding:12px 16px;position:fixed;bottom:0;width:100%;z-index:1000;border-top:1px solid #ff4466;">
        An error occurred. <a href="." class="reload" style="color:#00d4aa;">Reload</a>
        <span class="dismiss" style="cursor:pointer;float:right;">&#10006;</span>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet interop -->
    <script src="js/leafletInterop.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>

</html>
